                        targetCtx.strokeText(line, xOffset, startY + index * lineHeight);
                    });
                }
                
                targetCtx.fillStyle = data.color;
                lines.forEach((line, index) => {
                    targetCtx.fillText(line, xOffset, startY + index * lineHeight);
                });
                
                targetCtx.restore();
            } else {
                targetCtx.drawImage(data.img, -dw/2, -dh/2, dw, dh);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(UI_PADDING, UI_PADDING);
            ctx.save(); ctx.beginPath(); ctx.rect(0, 0, canvasSize, canvasSize); ctx.clip();
            
            images.forEach((data, index) => {
                ctx.save(); ctx.translate(data.x, data.y); ctx.rotate(data.rotation * Math.PI / 180);
                const dw = data.w * data.scale, dh = data.h * data.scale;
                
                if (data.maskShapes && data.maskShapes.length > 0) {
                    if (interactionMode === 'crop') { 
                        ctx.save(); ctx.globalAlpha = 0.3; 
                        drawObject(ctx, data, dw, dh);
                        ctx.restore(); 
                    }
                    ctx.save(); ctx.beginPath();

                    // --- 【修改在此】应用反选矩形 ---
                    if (data.maskInverse) {
                        ctx.rect(-99999, -99999, 199998, 199998); // 覆盖整个画面的极大矩形
                    }

                    data.maskShapes.forEach(s => defineShapePath(ctx, s));

                    // --- 【修改在此】如果是反选，则使用 evenodd 规则进行挖空裁剪 ---
                    ctx.clip(data.maskInverse ? "evenodd" : "nonzero");

                    ctx.clip(); ctx.globalAlpha = data.locked ? 0.8 : 1.0; 
                    drawObject(ctx, data, dw, dh);
                    ctx.restore();
                    
                    if (interactionMode === 'crop' && index === selectedIndex) {
                        data.maskShapes.forEach((s, si) => {
                            ctx.save(); ctx.translate(s.lx, s.ly); ctx.rotate(s.rotation * Math.PI / 180);
                            ctx.strokeStyle = si === activeShapeIndex ? "white" : "rgba(255,255,255,0.5)";
                            ctx.lineWidth = 1; ctx.setLineDash([2, 2]); ctx.strokeRect(-s.lw/2, -s.lh/2, s.lw, s.lh);
                            if (si === activeShapeIndex) {
                                ctx.setLineDash([]); ctx.fillStyle = "white";
                                [[-s.lw/2,-s.lh/2],[s.lw/2,-s.lh/2],[-s.lw/2,s.lh/2],[s.lw/2,s.lh/2],[0,-s.lh/2],[0,s.lh/2],[-s.lw/2,0],[s.lw/2,0]].forEach(p => ctx.fillRect(p[0]-3, p[1]-3, 6, 6));
                                ctx.beginPath(); ctx.moveTo(0, -s.lh/2); ctx.lineTo(0, -s.lh/2-20); ctx.stroke();
                                ctx.beginPath(); ctx.arc(0, -s.lh/2-20, 4, 0, Math.PI*2); ctx.fill();
                            }
                            ctx.restore();
                        });
                    }
                } else { 
                    ctx.globalAlpha = data.locked ? 0.8 : 1.0; 
                    drawObject(ctx, data, dw, dh); 
                }
                ctx.restore();
            });

            bufferCtx.clearRect(0, 0, doodleBuffer.width, doodleBuffer.height);
            bufferCtx.save(); bufferCtx.translate(UI_PADDING, UI_PADDING);
            drawPaths(bufferCtx); bufferCtx.restore();
            ctx.drawImage(doodleBuffer, -UI_PADDING, -UI_PADDING);
            ctx.restore();

            if (selectedIndex !== -1) {
                if (layerPanel) { layerPanel.style.opacity = "1"; layerPanel.style.pointerEvents = "auto"; }
                
                if (interactionMode === 'transform' || interactionMode === 'layer') {
                    const data = images[selectedIndex];
                    ctx.save(); 
                    ctx.translate(data.x, data.y); 
                    ctx.rotate(data.rotation * Math.PI / 180);
                    ctx.strokeStyle = data.locked ? COLORS.locked : COLORS.choc; 
                    ctx.lineWidth = 1.5; ctx.setLineDash([8, 6]);
                    const dw = data.w * data.scale;
                    const dh = data.h * data.scale;
                    ctx.strokeRect(-dw/2, -dh/2, dw, dh); 
                    ctx.setLineDash([]);
                    
                    const drawBtn = (hx, hy, bgColor, text, textColor = "white") => {
                        ctx.fillStyle = bgColor; ctx.beginPath(); 
                        const r = ICON_SIZE / 2;
                        ctx.roundRect(hx - r, hy - r, r*2, r*2, 6);
                        ctx.fill();
                        ctx.fillStyle = textColor; ctx.font = "bold 13px Arial"; 
                        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(text, hx, hy+1);
                    };

                    // 【修改在此】将删除按钮(左侧)的背景色改为 COLORS.accent (薄荷绿)，文字设为 COLORS.choc (巧克力色)
                    drawBtn(-dw/2, -dh/2 - 25, COLORS.accent, "×", COLORS.choc);
                    
                    // 保持锁定按钮(右侧)不变

                    drawBtn(dw/2, -dh/2 - 25, data.locked ? COLORS.locked : COLORS.muted, data.locked ? "L" : "U");
                    
                    if (!data.locked) {
                        const accentColor = COLORS.muted;
                        const drawHandle = (hx, hy, color) => {
                            ctx.fillStyle = "#fff"; ctx.strokeStyle = color; ctx.lineWidth = 2; 
                            ctx.beginPath(); ctx.arc(hx, hy, HANDLE_SIZE/2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        };
                        ctx.beginPath(); ctx.moveTo(0, -dh/2); ctx.lineTo(0, -dh/2 - 45); 
                        ctx.strokeStyle = accentColor; ctx.lineWidth = 1.5; ctx.stroke();
                        drawHandle(0, -dh/2 - 45, accentColor);
                        drawHandle(-dw/2, -dh/2, accentColor); drawHandle(dw/2, -dh/2, accentColor);
                        drawHandle(-dw/2, dh/2, accentColor); drawHandle(dw/2, dh/2, accentColor);
                    }
                    ctx.restore();
                }
            } else { 
                if (layerPanel) { layerPanel.style.opacity = "0.4"; layerPanel.style.pointerEvents = "none"; }
            }
            ctx.restore();
        }

        function drawPaths(targetCtx, scaleRatio = 1) {
            targetCtx.lineCap = 'round'; targetCtx.lineJoin = 'round';
            drawingPaths.forEach(path => {
                if (path.points.length < 2) return;
                targetCtx.save(); targetCtx.globalCompositeOperation = path.isEraser ? 'destination-out' : 'source-over';
                targetCtx.globalAlpha = path.opacity; targetCtx.beginPath();
                targetCtx.strokeStyle = path.isEraser ? 'black' : path.color; targetCtx.lineWidth = path.width * scaleRatio;
                targetCtx.moveTo(path.points[0].x * scaleRatio, path.points[0].y * scaleRatio);
                path.points.forEach(p => targetCtx.lineTo(p.x * scaleRatio, p.y * scaleRatio));
                targetCtx.stroke(); targetCtx.restore();
            });
        }

        // 【修改在此】增加防抖状态锁，防止在导出期间因多次点击导致内存过载崩溃
        let isExporting = false;

        async function exportSlices() {
            if (images.length === 0 && drawingPaths.length === 0) return;
            if (isExporting) return; // 【修改在此】防止重复导出
            isExporting = true;      // 【修改在此】锁定导出状态

            try { // 【修改在此】增加 try...finally 保证导出完成或意外出错后，一定能解锁状态和释放内存
                loadingOverlay.style.display = 'flex';

            // 【修改在此】动态计算总画布尺寸，确保每张独立切片都有 4500x4500 的超高分辨率，从而让单张图体积轻松突破 5MB
            const exportBaseSize = 4500 * gridSize; 

            const exportCanvas = document.getElementById('hiddenExportCanvas');
            const exCtx = exportCanvas.getContext('2d');
            exportCanvas.width = exportCanvas.height = exportBaseSize;
            const ratio = exportBaseSize / canvasSize;
            exCtx.fillStyle = canvasBgColor; exCtx.fillRect(0, 0, exportBaseSize, exportBaseSize);
            
                images.forEach(data => {
                    exCtx.save(); exCtx.translate(data.x * ratio, data.y * ratio); exCtx.rotate(data.rotation * Math.PI / 180);
                    const dw = data.w * data.scale * ratio, dh = data.h * data.scale * ratio;
                    if (data.maskShapes && data.maskShapes.length > 0) {
                        exCtx.save(); exCtx.beginPath();
                        
                        if (data.maskInverse) {
                            exCtx.rect(-99999, -99999, 199998, 199998);
                        }
                        
                        data.maskShapes.forEach(s => {
                            const ss = {...s, lx: s.lx*ratio, ly: s.ly*ratio, lw: s.lw*ratio, lh: s.lh*ratio};
                            defineShapePath(exCtx, ss);
                        });
                        
                        exCtx.clip(data.maskInverse ? "evenodd" : "nonzero"); 
                        
                        drawObject(exCtx, data, dw, dh, ratio);
                        exCtx.restore();
                    } else {
                        drawObject(exCtx, data, dw, dh, ratio);
                    }
                    exCtx.restore();
                });

                const eb = document.createElement('canvas'); eb.width = eb.height = exportBaseSize;
                drawPaths(eb.getContext('2d'), ratio); exCtx.drawImage(eb, 0, 0);

                const sliceSize = exportBaseSize / gridSize;
                const totalSlices = gridSize * gridSize;
                for (let i = 0; i < totalSlices; i++) {
                    document.getElementById('progressText').innerText = `SLICE PROCESS: ${Math.round((i+1)/totalSlices*100)}%`;
                    const row = Math.floor(i / gridSize), col = i % gridSize;
                    const sc = document.createElement('canvas'); sc.width = sc.height = sliceSize;
                    sc.getContext('2d').drawImage(exportCanvas, col*sliceSize, row*sliceSize, sliceSize, sliceSize, 0, 0, sliceSize, sliceSize);

                    // 【修改在此】将同步的 toDataURL 改为异步的 toBlob，防止超大图像转 Base64 耗尽内存导致二次导出卡死
                    await new Promise(resolve => {
                        sc.toBlob((blob) => {
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a'); 
                            link.download = `ArtSlice_${i+1}.jpg`;
                            link.href = url;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            URL.revokeObjectURL(url); // 清理 URL 引用
                            sc.width = 0; sc.height = 0; // 【修改在此】强制释放单个切片的 Canvas 内存
                            resolve();
                        }, 'image/jpeg', 1.0);
                    });
                    
                    await new Promise(r => setTimeout(r, 400));
                }

                // 【修改在此】强制清空巨大的主底图内存，避免下次操作 OOM (Out Of Memory)
                exportCanvas.width = 0; 
                exportCanvas.height = 0;
                eb.width = 0; 
                eb.height = 0;

            } catch (err) {
                console.error("导出切片异常:", err);
            } finally {
                loadingOverlay.style.display = 'none';
                isExporting = false; // 【修改在此】任务彻底结束，解除锁定允许下一次点击
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }

        // 自定义弹窗：替代被浏览器 iframe 拦截的 alert() 和 prompt()
        function customAlert(msg) {
            const div = document.createElement('div');
            div.className = 'fixed top-10 left-1/2 -translate-x-1/2 bg-[#3B2425] text-[#D1F9F1] px-6 py-4 rounded-xl shadow-xl z-[200] font-black text-xs text-center whitespace-pre-wrap transition-opacity duration-300';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 300);
            }, 3500);
        }

        function customPrompt(msg, callback) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-[#E8FDFA]/80 backdrop-blur-sm z-[200] flex items-center justify-center';
            overlay.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-cyan-100 w-80 max-w-[90%]">
                    <p class="text-xs font-black text-[#715D58] mb-4 whitespace-pre-wrap leading-relaxed">${msg}</p>
                    <input type="text" id="promptInput" class="w-full p-3 border-2 border-cyan-50 rounded-xl mb-5 focus:outline-none focus:border-cyan-300 text-sm font-bold text-slate-700 bg-cyan-50/30">
                    <div class="flex justify-end gap-2">
                        <button id="promptCancel" class="px-4 py-2.5 rounded-xl text-[11px] font-black text-slate-500 hover:bg-slate-50 transition-colors uppercase">取消</button>
                        <button id="promptOk" class="px-4 py-2.5 rounded-xl text-[11px] font-black text-[#D1F9F1] bg-[#3B2425] hover:bg-[#2a1a1a] transition-colors shadow-md uppercase">确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const input = overlay.querySelector('#promptInput');
            input.focus();

            const close = (val) => {
                overlay.remove();
                callback(val);
            };

            overlay.querySelector('#promptCancel').onclick = () => close(null);
            overlay.querySelector('#promptOk').onclick = () => close(input.value);
            input.onkeydown = (e) => { if (e.key === 'Enter') close(input.value); };
        }

        function fallbackManualFont() {
            customPrompt("当前浏览器沙盒权限受限，无法一键读取。\n\n请直接手动输入您电脑上已安装的字体名称（例如：Microsoft YaHei, 黑体, SimSun 等）：", (customFont) => {
                if (customFont && customFont.trim() !== '') {
                    const select = document.getElementById('textFontFamily');
                    const option = document.createElement('option');
                    option.value = customFont;
                    option.text = customFont + " (本地手动)";
                    select.appendChild(option);
                    select.value = customFont;
                    
                    if (interactionMode === 'text' && selectedIndex !== -1 && images[selectedIndex].type === 'text') {
                        addOrUpdateText(true);
                    } else {
                        draw();
                    }
                    customAlert("已将手动输入的字体选项添加至列表底部！\n若画布无变化，请检查字体名称拼写是否完全正确。");
                }
            });
        }

        async function loadLocalFonts() {
            if ('queryLocalFonts' in window) {
                try {
                    const fonts = await window.queryLocalFonts();
                    const select = document.getElementById('textFontFamily');
                    
                    const optGroup = document.createElement('optgroup');
                    optGroup.label = "🖥️ 本地系统字体";
                    
                    const fontNames = new Set();
                    fonts.forEach(font => fontNames.add(font.family));
                    
                    fontNames.forEach(family => {
                        const option = document.createElement('option');
                        option.value = family;
                        option.text = family;
                        optGroup.appendChild(option);
                    });
                    
                    select.appendChild(optGroup);
                    customAlert(`成功获取 ${fontNames.size} 款本地字体！\n已添加至下拉菜单底部。`);
                } catch (err) {
                    fallbackManualFont();
                }
            } else {
                fallbackManualFont();
            }
        }
    </script>
